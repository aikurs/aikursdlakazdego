<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naffy.ai — Logowanie</title>
<link rel="stylesheet" href="style.css">
<style>
body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1.5rem; }
body::before { content:''; position:fixed; inset:0; background: radial-gradient(ellipse at 70% 20%, rgba(29,158,117,0.06) 0%, transparent 60%); pointer-events:none; }
.login-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 2.5rem; max-width: 420px; width: 100%; position: relative; overflow: hidden; }
.login-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg, var(--green), var(--blue)); }
.login-logo { margin-bottom: 2rem; text-align: center; }
.login-logo h2 { font-size: .88rem; color: var(--muted); margin-top: .4rem; font-weight: 400; }
</style>
</head>
<body>
<div id="toast"></div>

<div class="login-card">
  <div class="login-logo">
    <div class="logo">Naffy<span>.ai</span></div>
    <h2>Panel platformy kursowej</h2>
  </div>

  <div class="alert alert-error" id="login-error" style="display: none;"></div>

  <div class="input-group">
    <label>Adres e-mail</label>
    <input class="input" type="email" id="login-email" placeholder="twoj@email.com">
  </div>
  <div class="input-group">
    <label>Hasło</label>
    <input class="input" type="password" id="login-pass" placeholder="••••••••">
  </div>
  <button class="btn btn-green btn-block btn-lg" id="login-btn" onclick="doLogin()">
    Zaloguj się →
  </button>

  <div style="text-align:center;margin-top:1.25rem">
    <a href="#" onclick="doResetPassword()" style="font-size:.82rem;color:var(--muted);text-decoration:none">Zapomniałem hasła</a>
  </div>
</div>

<!-- ZAMIANA: Biblioteka Supabase zamiast Firebase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script>
// KONFIGURACJA SUPABASE (Podmień na swoje dane z Project Settings -> API)
const SUPABASE_URL = "TWÓJ_SUPABASE_URL";
const SUPABASE_ANON_KEY = "TWÓJ_SUPABASE_ANON_KEY";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Funkcje pomocnicze do alertów (zabezpieczenie, jeśli nie ma ich w app.js)
function showAlert(id, message, type = 'error') {
  const el = document.getElementById(id);
  el.innerText = message;
  el.style.display = 'block';
  if(type === 'success') { el.className = 'alert alert-success'; }
  else if(type === 'info') { el.className = 'alert alert-info'; }
  else { el.className = 'alert alert-error'; }
}
function hideAlert(id) {
  document.getElementById(id).style.display = 'none';
}

// Automatyczne sprawdzanie sesji przy wejściu na stronę
async function checkActiveSession() {
  const { data: { user } } = await supabaseClient.auth.getUser();
  if (user) {
    handleRedirection(user.id);
  }
}
checkActiveSession();

// Wspólna funkcja sprawdzająca rolę w bazie i przekierowująca
async function handleRedirection(userId) {
  const { data: profile, error } = await supabaseClient
    .from('profiles')
    .select('role')
    .eq('id', userId)
    .single();

  if (!error && profile) {
    if (profile.role === 'admin') {
      window.location.href = 'admin.html';
    } else {
      window.location.href = 'panel.html'; // Przekierowanie do panelu klienta
    }
  }
}

async function doLogin(){
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  hideAlert('login-error');

  if(!email || !pass){ showAlert('login-error', 'Wpisz e-mail i hasło.'); return; }

  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Logowanie...';

  try {
    // Logowanie w Supabase
    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password: pass });

    if (error) throw error;

    // Pobranie roli i przekierowanie
    await handleRedirection(data.user.id);

  } catch(e) {
    let msg = 'Błąd logowania. Sprawdź e-mail i hasło.';
    // Obsługa komunikatów błędów z Supabase
    if(e.message.includes('Invalid login credentials')) msg = 'Nieprawidłowy e-mail lub hasło.';
    if(e.message.includes('Email not confirmed')) msg = 'Adres e-mail nie został jeszcze potwierdzony.';
    
    showAlert('login-error', msg);
    btn.disabled = false;
    btn.innerHTML = 'Zaloguj się →';
  }
}

async function doResetPassword(){
  const email = document.getElementById('login-email').value.trim();
  if(!email){ showAlert('login-error', 'Wpisz swój e-mail żeby zresetować hasło.', 'info'); return; }
  
  try {
    const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/reset-password.html', // Strona, gdzie użytkownik poda nowe hasło
    });
    
    if (error) throw error;
    showAlert('login-error', '✓ Wysłano link do resetu hasła na ' + email, 'success');
  } catch(e) {
    showAlert('login-error', 'Nie udało się wysłać linku do resetu. Sprawdź e-mail.');
  }
}

document.addEventListener('keydown', e => {
  if(e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
