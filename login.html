<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logowanie — Naffy.ai</title>
<link rel="stylesheet" href="style.css">
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 70% 20%,rgba(29,158,117,0.07) 0%,transparent 60%);pointer-events:none}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2.5rem;max-width:420px;width:100%;position:relative;overflow:hidden}
.login-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--green),var(--blue))}
.login-logo{text-align:center;margin-bottom:2rem}
.tabs-login{display:flex;gap:.3rem;border-bottom:1px solid var(--border);margin-bottom:1.5rem}
.tab-login{background:transparent;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.9rem;padding:.55rem 1rem;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s}
.tab-login.active{color:var(--green);border-bottom-color:var(--green)}
.login-form{display:none}.login-form.active{display:block}
</style>
</head>
<body>
<div id="toast"></div>
<div class="login-card">
  <div class="login-logo"><a href="#" class="logo" style="font-size:1.4rem">Naffy<span>.ai</span></a><p style="font-size:.84rem;color:var(--muted);margin-top:.4rem">Platforma kursu AI</p></div>
  <div class="tabs-login">
    <button class="tab-login active" onclick="switchLoginTab('login',this)">Zaloguj się</button>
    <button class="tab-login" onclick="switchLoginTab('reset',this)">Reset hasła</button>
  </div>
  <div class="login-form active" id="form-login">
    <div id="login-alert"></div>
    <div class="input-group"><label>E-mail</label><input class="input" type="email" id="login-email" placeholder="twoj@email.com"></div>
    <div class="input-group"><label>Hasło</label><input class="input" type="password" id="login-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn btn-green btn-block btn-lg" id="login-btn" onclick="doLogin()">Zaloguj się →</button>
  </div>
  <div class="login-form" id="form-reset">
    <div id="reset-alert"></div>
    <p style="font-size:.87rem;color:var(--muted);margin-bottom:1rem">Wpisz swój e-mail a wyślemy Ci link do resetowania hasła.</p>
    <div class="input-group"><label>E-mail</label><input class="input" type="email" id="reset-email" placeholder="twoj@email.com"></div>
    <button class="btn btn-outline btn-block" onclick="doReset()">Wyślij link resetujący</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="app.js"></script>
<script>
if (!firebase.apps.length) {
  firebase.initializeApp(FIREBASE_CONFIG)
}

firebase.auth().onAuthStateChanged(user => {
  if (user) window.location.href = 'panel.html'
})

function switchLoginTab(name, btn) {
  document.querySelectorAll('.tab-login').forEach(b => b.classList.remove('active'))
  document.querySelectorAll('.login-form').forEach(f => f.classList.remove('active'))
  btn.classList.add('active')
  document.getElementById('form-' + name).classList.add('active')
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim()
  const pass = document.getElementById('login-pass').value
  const alertEl = document.getElementById('login-alert')
  alertEl.innerHTML = ''
  if (!email || !pass) {
    alertEl.innerHTML = '<div style="color:var(--red);font-size:.84rem;margin-bottom:.75rem">Wypełnij wszystkie pola.</div>'
    return
  }
  const btn = document.getElementById('login-btn')
  btn.disabled = true
  btn.innerHTML = '<span class="spinner"></span> Logowanie...'
  try {
    await firebase.auth().signInWithEmailAndPassword(email, pass)
  } catch (e) {
    const msg =
      e.code === 'auth/wrong-password' || e.code === 'auth/user-not-found'
        ? 'Nieprawidłowy e-mail lub hasło.'
        : e.code === 'auth/too-many-requests'
        ? 'Zbyt wiele prób. Spróbuj za chwilę.'
        : e.message
    alertEl.innerHTML = `<div style="color:var(--red);font-size:.84rem;margin-bottom:.75rem">${msg}</div>`
    btn.disabled = false
    btn.innerHTML = 'Zaloguj się →'
  }
}

async function doReset() {
  const email = document.getElementById('reset-email').value.trim()
  const alertEl = document.getElementById('reset-alert')
  alertEl.innerHTML = ''
  if (!email) {
    alertEl.innerHTML = '<div style="color:var(--red);font-size:.84rem;margin-bottom:.75rem">Wpisz e-mail.</div>'
    return
  }
  try {
    await firebase.auth().sendPasswordResetEmail(email)
    alertEl.innerHTML = '<div style="color:var(--green);font-size:.84rem;margin-bottom:.75rem">✓ Link wysłany! Sprawdź skrzynkę.</div>'
  } catch (e) {
    alertEl.innerHTML = `<div style="color:var(--red);font-size:.84rem;margin-bottom:.75rem">${e.message}</div>`
  }
}
</script>
</body>
</html>
