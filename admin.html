<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Admin — Naffy.ai</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="loading-overlay" id="loading">Ładowanie panelu...</div>

<div class="app-layout" id="app" style="display:none">
  <div class="sidebar">
      <a href="index.html" class="logo">Naffy<span>.ai</span></a>
      <button class="btn btn-danger" onclick="doLogout()">Wyloguj się</button>
  </div>
  <div class="main-content">
      <div id="kurs-modules"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="app.js"></script>

<script>
firebase.initializeApp(FIREBASE_CONFIG);

// UŻYWAMY FUNKCJI POMOCNICZEJ DO BAZY
const getDb = () => firebase.firestore('(default)');

firebase.auth().onAuthStateChanged(user => {
  if(!user) { window.location.href = 'index.html'; return; }
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'grid';
  loadKursData();
});

async function loadKursData() {
  try {
    // Używamy getDb() zamiast bezpośrednio firebase.firestore()
    const doc = await getDb().collection('konfiguracja').doc('kurs').get();
    if (doc.exists) {
      kursData = doc.data();
    } else {
      kursData = { modules: [] };
      await getDb().collection('konfiguracja').doc('kurs').set(kursData);
    }
    renderKursEditor();
  } catch(e) {
    console.error("Błąd ładowania:", e);
  }
}

async function saveKursDataToFirebase(showAlert = false) {
  try {
    await getDb().collection('konfiguracja').doc('kurs').set(kursData);
    if(showAlert) alert("Zapisano!");
  } catch(e) {
    alert("Błąd zapisu: " + e.message);
  }
}

function doLogout(){ firebase.auth().signOut().then(()=>{ window.location.href = 'index.html' }); }

// [Wklej tutaj resztę swoich funkcji renderujących: renderKursEditor, addNewLesson, itp.]
</script>
</body>
</html>
